name: ci-main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-main.yaml
      - Dockerfile
      - requirements.txt

jobs:
  init:
    name: 🧐 Initialize
    runs-on: ubuntu-24.04-arm
    outputs:
      skip_ci: ${{ steps.check_flag.outputs.skip_ci }}
      image_version: ${{ steps.check_tag.outputs.image_version }}
      image_major: ${{ steps.check_tag.outputs.image_major }}
      image_minor: ${{ steps.check_tag.outputs.image_minor }}
      tag_exists: ${{ steps.check_tag.outputs.tag_exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for --no-ci flag in commit message
        id: check_flag
        run: |
          echo "Checking commit message for --no-ci flag..."
          if echo "${{ github.event.head_commit.message }}" | grep -- '--no-ci'; then
            echo "Skipping CI"
            echo "skip_ci=true" >> $GITHUB_OUTPUT
          else
            echo "skip_ci=false" >> $GITHUB_OUTPUT
          fi

      - name: Check release tag
        id: check_tag
        run: |
          VERSION=$(cat requirements.txt | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "image_version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "image_major=v$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "image_minor=v$(echo $VERSION | cut -d. -f1,2)" >> $GITHUB_OUTPUT
      
          export TAG_NAME="v${VERSION}"
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Tag $TAG_NAME does not meet the required format 'vX.Y.Z'."
            exit 1
          fi

          git fetch --unshallow --tags
          export TAG_EXISTS=$(git tag --list $TAG_NAME)
          if [ -n "$TAG_EXISTS" ]; then
            echo "Tag $TAG_NAME already exists."
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: 🏗️ Build
    needs: init
    if: ${{ needs.init.outputs.skip_ci == 'false' && needs.init.outputs.tag_exists == 'false' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build/Publish as GitHub Package
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.init.outputs.image_version }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.init.outputs.image_major }}
            ghcr.io/${{ github.repository }}:${{ needs.init.outputs.image_minor }}
          # Multi-arch annotations for ghcr.io package page
          annotations: |
            index:org.opencontainers.image.source=https://github.com/${{ github.repository }}
            index:org.opencontainers.image.description=Community-maintained Ansible Docker Image (Python 3.12)
            index:org.opencontainers.image.licenses=MIT
            index:org.opencontainers.image.title=${{ github.repository }}
            index:org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Test image
        run: |
          docker run -i ghcr.io/${{ github.repository }}:${{ needs.init.outputs.image_version }}

  release:
    name: 🚀 Release
    needs: [ init, build ]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          tag_prefix: ""
          custom_tag: ${{ needs.init.outputs.image_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.init.outputs.image_version }}
          name: "Ansible ${{ needs.init.outputs.image_version }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Ansible: Community Docker Image

            This release contains Ansible version ${{ needs.init.outputs.image_version }}.

            Available image tags for this release:
            - `${{ needs.init.outputs.image_major }}`
            - `${{ needs.init.outputs.image_minor }}`
            - `${{ needs.init.outputs.image_version }}`

            ### Usage

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.init.outputs.image_version }}
            docker run --rm -it ghcr.io/${{ github.repository }}:${{ needs.init.outputs.image_version }} ansible --version
            ```

            ---
            ⭐ **If you found this project useful, please consider giving it a star on GitHub!**

            ### Changelog

            ${{ steps.tag_version.outputs.changelog }}

  cleanup:
    name: 🧹 Cleanup
    needs: [ release ]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Delete merged version branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          merged_branches=$(gh pr list --state merged --base main --limit 10 --json headRefName --jq '.[].headRefName' | grep '^version/' || true)
          for branch in $merged_branches; do
            echo "Checking remote branch: $branch"
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              echo "Branch $branch still exists remotely. Deleting..."
              git push origin --delete "$branch" || echo "Failed to delete $branch"
            fi
          done
